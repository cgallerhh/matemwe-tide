name: Daily Job Search

on:
  # Every weekday at 07:00 UTC = 09:00 CEST (summer) / 08:00 CET (winter)
  # Adjust the hour if you want exact 9:00 in winter: change 7 → 8
  schedule:
    - cron: '0 7 * * 1-5'

  # Manual trigger for testing – just click "Run workflow" in GitHub Actions
  workflow_dispatch:

concurrency:
  group: job-search
  cancel-in-progress: false   # never cancel a running search

jobs:
  search:
    name: Scrape & send daily digest
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit seen_jobs.json back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job search
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m job_search.main

      # Persist the deduplication state so jobs are never sent twice
      - name: Save seen-jobs state
        if: always()   # run even if the email step fails
        run: |
          git config user.name  "job-search-bot"
          git config user.email "noreply@github.com"
          git add data/seen_jobs.json
          # Only commit if there are actual changes
          git diff --staged --quiet && echo "No changes to seen_jobs.json" || \
            git commit -m "chore: update seen_jobs [skip ci]"
          # Pull first to avoid push conflicts
          git pull --rebase origin claude/job-search-automation-cfxxV || true
          git push origin HEAD || true
